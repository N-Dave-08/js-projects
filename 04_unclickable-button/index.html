<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unclickable Button</title>
    <script src="main.js" defer></script>
    <style>
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }

      #evil-button {
        position: absolute;
        white-space: nowrap;
        font-size: 1rem;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <button id="evil-button" type="button">can't touch me</button>
  </body>
</html>
